<!DOCTYPE html>
<html>
<head>
<title>INDACO Fit Control System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f4f8;
    padding: 20px;
}

.container {
    background: white;
    max-width: 500px;
    width: 100%;
    margin: auto;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
    color: #1a237e;
    margin-bottom: 5px;
}

h3 {
    text-align: center;
    margin-top: 0;
    font-weight: normal;
    color: #555;
}

label {
    font-weight: bold;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0 15px 0;
    font-size: 16px;
}

.btn-row {
    display: flex;
    gap: 10px;
}

button {
    flex: 1;
    padding: 10px;
    background: #1a237e;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 16px;
}

.clear-btn {
    background: #b71c1c;
}

.result {
    margin-top: 15px;
    font-weight: bold;
    font-size: 16px;
}

.green { color: green; }
.red { color: red; }

@media (max-width: 480px) {
    body { padding: 10px; }
}
</style>
</head>

<body>

<div class="container">

<div style="text-align:center;">
    <img src="logo.png" alt="INDACO Logo" style="width:120px; margin-bottom:10px;">
    <h1 style="margin:5px 0;">INDACO</h1>
    <h3 style="margin:0; font-weight:normal;">Fit Control Measurement System</h3>
</div>
    

<label>Select Unit</label>
<select id="unit">
    <option value="cm">Centimeters (cm)</option>
    <option value="inch">Inches (inch)</option>
</select>

<label>Measurement Name (Optional)</label>
<input type="text" id="measurement" onkeydown="moveNext(event,'buyer')">

<label>Buyer Spec</label>
<input type="number" id="buyer" onkeydown="moveNext(event,'before')">

<label>Before Wash</label>
<input type="number" id="before" onkeydown="moveNext(event,'after')">

<label>After Wash</label>
<input type="number" id="after" onkeydown="autoCalculate(event)">

<div class="btn-row">
    <button onclick="calculate()">Calculate</button>
    <button class="clear-btn" onclick="clearForm()">Clear</button>
</div>

<div class="result" id="output"></div>

</div>

<script>

// ENTER NAVIGATION
function moveNext(event, nextFieldId) {
    if (event.key === "Enter") {
        event.preventDefault();
        document.getElementById(nextFieldId).focus();
    }
}

function autoCalculate(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        calculate();
    }
}

// FRACTION CONVERSION (1/16 precision)
function decimalToFraction(value) {
    let whole = Math.floor(value);
    let decimal = value - whole;
    let denominator = 16;
    let numerator = Math.round(decimal * denominator);

    if (numerator === 0) return whole;
    if (numerator === denominator) return whole + 1;

    function gcd(a,b){ return b ? gcd(b,a%b) : a; }
    let divisor = gcd(numerator, denominator);
    numerator /= divisor;
    denominator /= divisor;

    return whole + " " + numerator + "/" + denominator;
}

// CALCULATION
function calculate() {

    let unit = document.getElementById("unit").value;
    let measurement = document.getElementById("measurement").value.trim();
    let buyer = parseFloat(document.getElementById("buyer").value);
    let before = parseFloat(document.getElementById("before").value);
    let after = parseFloat(document.getElementById("after").value);

    if (!buyer || !before || !after) {
        document.getElementById("output").innerHTML = "Please enter Buyer, Before Wash and After Wash values.";
        return;
    }

    let shrinkage = ((before - after) / before) * 100;
    let required = (buyer * before) / after;
    let difference = after - buyer;

    shrinkage = shrinkage.toFixed(2);

    if (unit === "inch") {
        required = decimalToFraction(required);
        difference = decimalToFraction(difference);
    } else {
        required = Math.round(required);
        difference = difference.toFixed(2);
    }

    let statusClass = Math.abs(after - buyer) <= 0.5 ? "green" : "red";

    let resultText = "";

    if (measurement !== "") {
        resultText += "Measurement: " + measurement + "<br>";
    }

    resultText +=
        "Shrinkage %: " + shrinkage + "%<br>" +
        "Required Size: " + required + " " + unit + "<br>" +
        "<span class='"+statusClass+"'>" +
        "Difference: " + difference + " " + unit + "</span>";

    document.getElementById("output").innerHTML = resultText;
}

// CLEAR FORM
function clearForm() {
    document.getElementById("measurement").value = "";
    document.getElementById("buyer").value = "";
    document.getElementById("before").value = "";
    document.getElementById("after").value = "";
    document.getElementById("output").innerHTML = "";
    document.getElementById("measurement").focus();
}

// SHORTCUT: CTRL + SPACE
document.addEventListener("keydown", function(event) {
    if (event.ctrlKey && event.code === "Space") {
        event.preventDefault();
        clearForm();
    }
});

</script>

</body>
</html>
